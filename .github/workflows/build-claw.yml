name: Build Claw

on:
  workflow_dispatch:
    inputs:
      claw_version:
        description: 'OpenClaw version (leave empty for latest npm)'
        required: false
      brain_version:
        description: 'Cursor Brain version (leave empty for latest npm)'
        required: false

env:
  NODE_VERSION: '22'

jobs:
  build-claw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      hash: ${{ steps.hash.outputs.sri }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve version
        id: ver
        run: |
          VER="${{ inputs.claw_version }}"
          [[ -z "$VER" ]] && VER=$(npm view openclaw version)
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Bundle from npm
        run: |
          mkdir claw && cd claw
          npm init -y --silent 2>/dev/null
          npm install "openclaw@${{ steps.ver.outputs.version }}" --production --ignore-scripts
          find node_modules -xtype l -delete 2>/dev/null || true
          rm -f package.json package-lock.json
          cd ..
          tar czf claw-${{ steps.ver.outputs.version }}.tar.gz claw/

      - name: Compute hash
        id: hash
        run: |
          SHA=$(sha256sum claw-${{ steps.ver.outputs.version }}.tar.gz | awk '{print $1}')
          SRI="sha256-$(echo -n "$SHA" | xxd -r -p | base64 -w0)"
          echo "sri=$SRI" >> "$GITHUB_OUTPUT"

      - name: Create release
        run: |
          TAG="claw-v${{ steps.ver.outputs.version }}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null && exit 0
          gh release create "$TAG" \
            --title "Claw v${{ steps.ver.outputs.version }}" \
            --notes "Pre-bundled OpenClaw from npm registry.

          Nix hash: \`${{ steps.hash.outputs.sri }}\`" \
            --repo "$GITHUB_REPOSITORY" \
            claw-${{ steps.ver.outputs.version }}.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-brain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      hash: ${{ steps.hash.outputs.sri }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve version
        id: ver
        run: |
          VER="${{ inputs.brain_version }}"
          [[ -z "$VER" ]] && VER=$(npm view openclaw-cursor-brain version)
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Bundle from npm
        run: |
          mkdir claw-cursor-brain && cd claw-cursor-brain
          npm init -y --silent 2>/dev/null
          npm install "openclaw-cursor-brain@${{ steps.ver.outputs.version }}" --production --ignore-scripts
          find node_modules -xtype l -delete 2>/dev/null || true
          rm -f package.json package-lock.json
          cd ..
          tar czf claw-cursor-brain-${{ steps.ver.outputs.version }}.tar.gz claw-cursor-brain/

      - name: Compute hash
        id: hash
        run: |
          SHA=$(sha256sum claw-cursor-brain-${{ steps.ver.outputs.version }}.tar.gz | awk '{print $1}')
          SRI="sha256-$(echo -n "$SHA" | xxd -r -p | base64 -w0)"
          echo "sri=$SRI" >> "$GITHUB_OUTPUT"

      - name: Create release
        run: |
          TAG="claw-cursor-brain-v${{ steps.ver.outputs.version }}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null && exit 0
          gh release create "$TAG" \
            --title "Claw Cursor Brain v${{ steps.ver.outputs.version }}" \
            --notes "Pre-bundled openclaw-cursor-brain from npm registry.

          Nix hash: \`${{ steps.hash.outputs.sri }}\`" \
            --repo "$GITHUB_REPOSITORY" \
            claw-cursor-brain-${{ steps.ver.outputs.version }}.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
