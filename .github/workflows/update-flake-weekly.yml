name: Weekly Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  # 1. Update flake inputs + check/update package versions
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.push.outputs.has_changes }}
      seerr_version: ${{ steps.markers.outputs.seerr_version }}
      claw_version: ${{ steps.markers.outputs.claw_version }}
      brain_version: ${{ steps.markers.outputs.brain_version }}
      summary: ${{ steps.pkgs.outputs.summary }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update flake inputs
        run: nix flake update

      - name: Auto-update packages
        id: pkgs
        run: ./.github/scripts/auto-update-pkgs.sh --update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read markers
        id: markers
        run: |
          echo "seerr_version=$(cat .seerr-new-version 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "claw_version=$(cat .claw-new-version 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "brain_version=$(cat .claw-brain-new-version 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      - name: Push to update branch
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B auto/weekly-update
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update flake inputs + package versions"
            git push -f origin auto/weekly-update
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # 2. Build Seerr if new upstream version detected
  build-seerr:
    needs: check
    if: needs.check.outputs.seerr_version != ''
    uses: ./.github/workflows/build-seerr.yml
    with:
      seerr_version: ${{ needs.check.outputs.seerr_version }}
    secrets: inherit
    permissions:
      contents: write

  # 3. Build Claw packages if new npm versions detected
  build-claw:
    needs: check
    if: needs.check.outputs.claw_version != '' || needs.check.outputs.brain_version != ''
    uses: ./.github/workflows/build-claw.yml
    with:
      claw_version: ${{ needs.check.outputs.claw_version }}
      brain_version: ${{ needs.check.outputs.brain_version }}
    secrets: inherit
    permissions:
      contents: write

  # 4. Apply build hashes, create PR, auto-merge
  finalize:
    needs: [check, build-seerr, build-claw]
    if: always() && needs.check.result == 'success' && needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto/weekly-update

      - name: Apply Seerr hash
        if: needs.build-seerr.result == 'success'
        run: |
          VB="${{ needs.build-seerr.outputs.version_build }}"
          HASH="${{ needs.build-seerr.outputs.hash }}"
          [[ -z "$VB" || -z "$HASH" ]] && exit 0
          sed -i "s|version = \"[^\"]*\"|version = \"${VB}\"|" pkgs/seerr/default.nix
          sed -i "s|hash = \"[^\"]*\"|hash = \"${HASH}\"|" pkgs/seerr/default.nix

      - name: Apply Claw hashes
        if: needs.build-claw.result == 'success'
        run: |
          CV="${{ needs.build-claw.outputs.claw_version }}"
          CH="${{ needs.build-claw.outputs.claw_hash }}"
          BV="${{ needs.build-claw.outputs.brain_version }}"
          BH="${{ needs.build-claw.outputs.brain_hash }}"
          if [[ -n "$CV" && -n "$CH" ]]; then
            sed -i "s|version = \"[^\"]*\"|version = \"${CV}\"|" pkgs/claw/default.nix
            sed -i "s|hash = \"[^\"]*\"|hash = \"${CH}\"|" pkgs/claw/default.nix
          fi
          if [[ -n "$BV" && -n "$BH" ]]; then
            sed -i "s|version = \"[^\"]*\"|version = \"${BV}\"|" pkgs/claw-cursor-brain/default.nix
            sed -i "s|hash = \"[^\"]*\"|hash = \"${BH}\"|" pkgs/claw-cursor-brain/default.nix
          fi

      - name: Commit hash updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update build hashes"
          git push origin auto/weekly-update

      - name: Create PR
        id: pr
        run: |
          PR_NUM=$(gh pr list --head auto/weekly-update --base main --json number -q '.[0].number' 2>/dev/null || true)
          if [[ -z "$PR_NUM" ]]; then
            PR_NUM=$(gh pr create \
              --title "chore: weekly dependency update" \
              --body "Automated weekly update.

          **Flake inputs** — \`nix flake update\`

          **Packages**
          ${{ needs.check.outputs.summary }}

          > Merge → \`make activate\` on Pi." \
              --head auto/weekly-update \
              --base main \
              --label dependencies \
              2>&1 | grep -oP '\d+$' || true)
          fi
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge
        if: steps.pr.outputs.number != ''
        run: gh pr merge "${{ steps.pr.outputs.number }}" --squash --delete-branch || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
