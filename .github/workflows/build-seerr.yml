name: Build Seerr

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-seerr.yml'
      - 'pkgs/seerr/default.nix'
  workflow_dispatch:
    inputs:
      seerr_version:
        description: 'Seerr version override (e.g. 3.0.1, leave empty to use pkgs/seerr/default.nix)'
        required: false

env:
  NODE_VERSION: '22'

jobs:
  build:
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            suffix: linux-amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            suffix: linux-arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout mediaserver
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ inputs.seerr_version }}" ]; then
            echo "version=${{ inputs.seerr_version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep -E '^\s+version\s*=' pkgs/seerr/default.nix | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone Seerr
        uses: actions/checkout@v4
        with:
          repository: seerr-team/seerr
          ref: v${{ steps.version.outputs.version }}
          path: seerr-src

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build
        working-directory: seerr-src
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm prune --prod --ignore-scripts
          rm -rf .next/cache
          find node_modules -xtype l -delete

      - name: Package
        run: |
          mkdir seerr
          cp -r seerr-src/.next seerr-src/node_modules seerr-src/dist \
                seerr-src/public seerr-src/package.json seerr/
          [ -f seerr-src/seerr-api.yml ] && cp seerr-src/seerr-api.yml seerr/ || true
          [ -f seerr-src/jellyseerr-api.yml ] && cp seerr-src/jellyseerr-api.yml seerr/ || true
          tar czf seerr-${{ matrix.suffix }}.tar.gz seerr/

      - name: Compute SRI hash
        run: |
          sha256=$(sha256sum seerr-${{ matrix.suffix }}.tar.gz | awk '{print $1}')
          sri="sha256-$(echo -n "$sha256" | xxd -r -p | base64 -w0)"
          echo "### seerr-${{ matrix.suffix }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "sri: ${sri}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seerr-${{ matrix.suffix }}
          path: seerr-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Compute hashes for release notes
        id: hashes
        run: |
          ARM64_SHA256=$(sha256sum -b seerr-linux-arm64/seerr-linux-arm64.tar.gz | awk '{print $1}')
          AMD64_SHA256=$(sha256sum -b seerr-linux-amd64/seerr-linux-amd64.tar.gz | awk '{print $1}')
          ARM64_SRI="sha256-$(echo -n "$ARM64_SHA256" | xxd -r -p | base64 -w0)"
          AMD64_SRI="sha256-$(echo -n "$AMD64_SHA256" | xxd -r -p | base64 -w0)"
          echo "arm64_hash=${ARM64_SRI}" >> "$GITHUB_OUTPUT"
          echo "amd64_hash=${AMD64_SRI}" >> "$GITHUB_OUTPUT"
          {
            echo "Nix hashes — update pkgs/seerr/default.nix:"
            echo ""
            echo "linux_arm64: $ARM64_SRI"
            echo "linux_amd64: $AMD64_SRI"
            echo ""
            echo "Or run: ./scripts/update-seerr-hashes.sh"
          } >> hashes.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: seerr-v${{ needs.build.outputs.version }}
          name: Seerr v${{ needs.build.outputs.version }}
          body: |
            Pre-built Seerr (formerly Jellyseerr) for Nix binary installation.
            Base version: v${{ needs.build.outputs.version }}

            **Nix hashes** — update `pkgs/seerr/default.nix` or run `./scripts/update-seerr-hashes.sh`:
            - linux_arm64: `${{ steps.hashes.outputs.arm64_hash }}`
            - linux_amd64: `${{ steps.hashes.outputs.amd64_hash }}`
          files: |
            seerr-linux-arm64/seerr-linux-arm64.tar.gz
            seerr-linux-amd64/seerr-linux-amd64.tar.gz
            hashes.txt
          make_latest: false
