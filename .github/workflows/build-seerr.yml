name: Build Seerr
# dummy push to trigger workflow
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-seerr.yml'
      - 'pkgs/seerr/default.nix'
  workflow_dispatch:
    inputs:
      seerr_version:
        description: 'Seerr version override (e.g. 3.0.1, leave empty to use pkgs/seerr/default.nix)'
        required: false

env:
  NODE_VERSION: '22'

jobs:
  build:
    outputs:
      version: ${{ steps.version.outputs.version }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout mediaserver
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ inputs.seerr_version }}" ]; then
            echo "version=${{ inputs.seerr_version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep -E '^\s+version\s*=' pkgs/seerr/default.nix | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone Seerr
        uses: actions/checkout@v4
        with:
          repository: seerr-team/seerr
          ref: v${{ steps.version.outputs.version }}
          path: seerr-src

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: seerr-src/pnpm-lock.yaml

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: seerr-src/.next/cache
          key: seerr-next-arm64-${{ hashFiles('seerr-src/pnpm-lock.yaml') }}
          restore-keys: seerr-next-arm64-

      - name: Build
        working-directory: seerr-src
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm prune --prod --ignore-scripts
          find node_modules -xtype l -delete

      - name: Package
        run: |
          mkdir seerr
          cp -r seerr-src/.next seerr-src/node_modules seerr-src/dist \
                seerr-src/public seerr-src/package.json seerr/
          rm -rf seerr/.next/cache
          [ -f seerr-src/seerr-api.yml ] && cp seerr-src/seerr-api.yml seerr/ || true
          [ -f seerr-src/jellyseerr-api.yml ] && cp seerr-src/jellyseerr-api.yml seerr/ || true
          tar czf seerr-linux-arm64.tar.gz seerr/

      - name: Compute SRI hash
        run: |
          sha256=$(sha256sum seerr-linux-arm64.tar.gz | awk '{print $1}')
          sri="sha256-$(echo -n "$sha256" | xxd -r -p | base64 -w0)"
          echo "### seerr-linux-arm64" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "sri: ${sri}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seerr-linux-arm64
          path: seerr-linux-arm64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: false  # Disabled: tag creation blocked by repo rules. Download binary from workflow Artifacts instead.
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: seerr-linux-arm64

      - name: Check if release exists
        id: release-check
        run: |
          if gh release view "seerr-v${{ needs.build.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute hash for release notes
        id: hashes
        run: |
          ARM64_SHA256=$(sha256sum -b seerr-linux-arm64/seerr-linux-arm64.tar.gz | awk '{print $1}')
          ARM64_SRI="sha256-$(echo -n "$ARM64_SHA256" | xxd -r -p | base64 -w0)"
          echo "arm64_hash=${ARM64_SRI}" >> "$GITHUB_OUTPUT"
          {
            echo "Nix hash — update pkgs/seerr/default.nix:"
            echo ""
            echo "linux_arm64: $ARM64_SRI"
            echo ""
            echo "Or run: ./scripts/update-seerr-hashes.sh"
          } >> hashes.txt

      - name: Create release
        if: steps.release-check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          tag_name: seerr-v${{ needs.build.outputs.version }}
          name: Seerr v${{ needs.build.outputs.version }}
          body: |
            Pre-built Seerr (formerly Jellyseerr) for Nix — arm64 (Raspberry Pi) only.
            Base version: v${{ needs.build.outputs.version }}

            **Nix hash** — update `pkgs/seerr/default.nix` or run `./scripts/update-seerr-hashes.sh`:
            - linux_arm64: `${{ steps.hashes.outputs.arm64_hash }}`
          files: |
            seerr-linux-arm64/seerr-linux-arm64.tar.gz
            hashes.txt
          make_latest: false
