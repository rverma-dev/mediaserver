services:
  caddy:
    image: ${CADDY_IMAGE:-ghcr.io/rverma-dev/caddy-duckdns:latest}
    container_name: caddy
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - DUCKDNS_SUBDOMAIN=${DUCKDNS_SUBDOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:2019:2019"
    volumes:
      - ${MEDIASERVER_ROOT}/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${MEDIASERVER_ROOT}/config/caddy/data:/data
      - ${MEDIASERVER_ROOT}/config/caddy/config:/config
    networks:
      mediaserver:
        ipv4_address: 172.20.0.2
    restart: unless-stopped

  warp:
    image: caomingjun/warp
    container_name: warp
    environment:
      - WARP_SLEEP=2
      - WARP_LOG_LEVEL=warn
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ${MEDIASERVER_ROOT}/config/warp:/var/lib/cloudflare-warp
    extra_hosts:
      - "caddy:172.20.0.2"
      - "jellyfin:172.20.0.4"
      - "qbittorrent:172.20.0.5"
      - "sonarr:172.20.0.6"
      - "radarr:172.20.0.7"
      - "bazarr:172.20.0.8"
    networks:
      mediaserver:
        ipv4_address: 172.20.0.3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-x", "socks5h://127.0.0.1:1080", "-s", "https://cloudflare.com/cdn-cgi/trace"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=http://192.168.68.60/jellyfin
      - all_proxy=socks5://172.20.0.3:1080
      - no_proxy=172.20.0.0/24,192.168.68.0/24,localhost,127.0.0.1
    volumes:
      - ${MEDIASERVER_ROOT}/config/jellyfin:/config
      - ${MEDIASERVER_ROOT}/data:/data
    devices:
      - /dev/video19:/dev/video19
      - /dev/media1:/dev/media1
    group_add:
      - "video"
    depends_on:
      warp:
        condition: service_healthy
    networks:
      mediaserver:
        ipv4_address: 172.20.0.4
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${MEDIASERVER_ROOT}/config/qbittorrent:/config
      - ${MEDIASERVER_ROOT}/data:/data
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      mediaserver:
        ipv4_address: 172.20.0.5
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIASERVER_ROOT}/config/sonarr:/config
      - ${MEDIASERVER_ROOT}/data:/data
    networks:
      mediaserver:
        ipv4_address: 172.20.0.6
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIASERVER_ROOT}/config/radarr:/config
      - ${MEDIASERVER_ROOT}/data:/data
    networks:
      mediaserver:
        ipv4_address: 172.20.0.7
    restart: unless-stopped

  prowlarr:
    image: linuxserver/prowlarr
    container_name: prowlarr
    network_mode: "service:warp"
    depends_on:
      warp:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIASERVER_ROOT}/config/prowlarr:/config
    restart: unless-stopped

  seerr:
    image: seerr/seerr
    container_name: seerr
    network_mode: "service:warp"
    depends_on:
      warp:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=warn
    volumes:
      - ${MEDIASERVER_ROOT}/config/seerr:/app/config
    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIASERVER_ROOT}/config/bazarr:/config
      - ${MEDIASERVER_ROOT}/data:/data
    networks:
      mediaserver:
        ipv4_address: 172.20.0.8
    restart: unless-stopped

  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DOCKER_HOST: unix:///var/run/docker.sock
    group_add:
      - "985"
    volumes:
      - ${MEDIASERVER_ROOT}/config/openclaw:/home/node/.openclaw
      - ${MEDIASERVER_ROOT}/openclaw/workspace:/home/node/.openclaw/workspace
      - ${MEDIASERVER_ROOT}/openclaw/workspace-quick:/home/node/.openclaw/workspace-quick
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      - ${MEDIASERVER_ROOT}:/opt/mediaserver:ro
    networks:
      mediaserver:
        ipv4_address: 172.20.0.10
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "openclaw.mjs",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]

  host-exec:
    image: debian:bookworm-slim
    container_name: host-exec
    privileged: true
    pid: host
    network_mode: host
    command: ["sleep", "infinity"]
    restart: unless-stopped

networks:
  mediaserver:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
